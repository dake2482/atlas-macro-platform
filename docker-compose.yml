x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:-postgresql://atlasmacro:atlasmacro-local-only@db:5432/atlasmacro}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
  SITE_URL: ${SITE_URL:-http://localhost}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlasmacro}
      POSTGRES_USER: ${POSTGRES_USER:-atlasmacro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlasmacro-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn atlasmacro.wsgi:application --bind 0.0.0.0:8000
      --workers ${WEB_CONCURRENCY:-2} --timeout 60 --access-logfile -"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - artifacts_data:/app/data/artifacts
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/healthz/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    command: >-
      celery -A atlasmacro worker --loglevel=${LOG_LEVEL:-INFO}
      --concurrency=${CELERY_CONCURRENCY:-1} --prefetch-multiplier=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - artifacts_data:/app/data/artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A atlasmacro inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  beat:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    command: celery -A atlasmacro beat --loglevel=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      disable: true
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-3080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  artifacts_data:
