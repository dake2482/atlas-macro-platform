  {% if source.name %}{{ source.name }}{% else %}{{ source }}{% endif %}
  {% if quality_status == "stale" %}· 已过期{% elif quality_status == "fallback" %}· 备用源{% elif quality_status == "estimated" %}· 模型估算{% elif quality_status == "error" %}· 异常{% endif %}
</span>
